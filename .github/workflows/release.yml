name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/python-automation-tool/

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install project and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python -c "from python_automation_tool import __version__; print(__version__)")"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$package_version" = "$tag_version"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check --strict dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "${GITHUB_REF_NAME}"
